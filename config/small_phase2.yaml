# RGEN "small" — phase 2 fine-tuning with full reasoning depth
# Same architecture as small.yaml but K=8 and fine-tuning hyperparams

vocab_size: 32000
d_model: 512

# Reasoner
reasoner_layers: 2
reasoner_heads: 8
reasoner_d_ff: 1024
reasoner_iterations: 8  # full recursive depth for reasoning
reasoner_max_iterations: 16

# Generator
generator_layers: 6
generator_heads: 8
generator_d_ff: 2048
max_seq_len: 512

# Model training params
dropout: 0.1
norm_eps: 1.0e-5
lambda_reconstruction: 0.1
lambda_diversity: 0.01

# Training loop (section 5.5 — phase 2 fine-tuning)
batch_size: 4
gradient_accumulation_steps: 16
learning_rate: 3.0e-5
min_lr: 3.0e-6
warmup_steps: 500
max_steps: 20000
weight_decay: 0.1
generator_only_steps: 0
reasoner_warmup_steps: 2000
log_interval: 100
save_interval: 2000
